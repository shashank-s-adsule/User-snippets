; ----------------------------------
; World Clock - Live Time Display
; Regions: India (IST), Singapore (SGT), USA Santa Clara (PST/PDT)
; ----------------------------------

[Rainmeter]
Update=1000
Background=#@#Background.png
BackgroundMode=3
BackgroundMargins=0,34,0,14
AccurateText=1

[Variables]
fontName=Trebuchet MS
textSize=8
colorText=255,255,255,205
colorDim=255,255,255,120
skinTitle=World Time

; ── TIME MEASURES ──

; India Standard Time — UTC+5:30
[measureTimeIndia]
Measure=Time
TimeZone=5.5
DaylightSavingTime=0
Format=%H:%M:%S
DynamicVariables=1

[measureDateIndia]
Measure=Time
TimeZone=5.5
DaylightSavingTime=0
Format=%a, %d %b
DynamicVariables=1

; Singapore Standard Time — UTC+8:00
[measureTimeSingapore]
Measure=Time
TimeZone=8
DaylightSavingTime=0
Format=%H:%M:%S
DynamicVariables=1

[measureDateSingapore]
Measure=Time
TimeZone=8
DaylightSavingTime=0
Format=%a, %d %b
DynamicVariables=1

; USA Pacific Time — UTC-8 (PST) / UTC-7 (PDT, auto DST)
[measureTimeSantaClara]
Measure=Time
TimeZone=-8
DaylightSavingTime=1
Format=%H:%M:%S
DynamicVariables=1

[measureDateSantaClara]
Measure=Time
TimeZone=-8
DaylightSavingTime=1
Format=%a, %d %b
DynamicVariables=1

; ── STYLES ──

[styleTitle]
StringAlign=Center
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#colorText#
FontFace=#fontName#
FontSize=10
AntiAlias=1

[styleRegion]
StringAlign=Left
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,30
FontColor=#colorText#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1

[styleTime]
StringAlign=Right
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,40
FontColor=100,220,255,240
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1

[styleDate]
StringAlign=Right
StringStyle=Normal
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorDim#
FontFace=#fontName#
FontSize=7
AntiAlias=1

[styleTZ]
StringAlign=Left
StringStyle=Normal
FontColor=#colorDim#
FontFace=#fontName#
FontSize=7
AntiAlias=1

; ── TITLE ──

[meterTitle]
Meter=String
MeterStyle=styleTitle
Text=#skinTitle#
X=100
Y=12
W=190
H=18

[meterLine]
Meter=Shape
Shape=Rectangle 10,32,180,1 | StrokeWidth 0 | Fill Color 255,255,255,15

