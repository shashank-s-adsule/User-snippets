; ----------------------------------
; Reminder with Daily Checkbox - Colored Box Toggle
; ----------------------------------

[Rainmeter]
Update=1000
Background=#@#Background.png
BackgroundMode=3
BackgroundMargins=0,34,0,14
AccurateText=1

[Variables]
fontName=Trebuchet MS
textSize=8
colorText=255,255,255,205
noteTitle=Daily Reminder

; ── STYLES ──
[styleTitle]
StringAlign=Center
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#colorText#
FontFace=#fontName#
FontSize=10
AntiAlias=1

[styleText]
StringAlign=Left
StringStyle=Normal
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorText#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1

; ── TITLE ──
[meterTitle]
Meter=String
MeterStyle=styleTitle
Text=#noteTitle#
X=100
Y=12
W=190
H=18

[meterLine]
Meter=Shape
Shape=Rectangle 10,32,180,1 | StrokeWidth 0 | Fill Color 255,255,255,15

; ── TASK 1 ──
[meterCB1off]
Meter=Shape
Shape=Rectangle 0,0,12,12,2 | Fill Color 225,0,0,255 | StrokeWidth 0
X=10
Y=44
Hidden=0
LeftMouseUpAction=[!HideMeter meterCB1off][!ShowMeter meterCB1on][!Redraw]

[meterCB1on]
Meter=Shape
Shape=Rectangle 0,0,12,12,2 | Fill Color 60,200,80,255 | StrokeWidth 0
X=10
Y=44
Hidden=1
LeftMouseUpAction=[!HideMeter meterCB1on][!ShowMeter meterCB1off][!Redraw]

[meterTask1]
Meter=String
MeterStyle=styleText
Text=Task 1
X=28
Y=42
W=160
H=16

